  - {type: variant, offset: 5306, length: 50, content: 善能護戒，護戒故無悔。若從他受若淨心受＝戒【聖】【知】，〔是名〕－【宮】受【大】，戒【聖】【知】受戒，此二是法。若犯而悔、若專精不犯，此二隨法。若從他受、若淨心受、若專精不犯，此三法, 宋: 於諸受戒能善護持善護持故心無有悔從他正受善淨心此二是法若犯即懺從初堅持此二隨法從他正受善淨心從初堅持此三, 元: 於諸受戒能善護持善護持故心無有悔從他正受善淨心此二是法若犯即懺從初堅持此二隨法從他正受善淨心從初堅持此三, 明: 於諸受戒能善護持善護持故心無有悔從他正受善淨心此二是法若犯即懺從初堅持此二隨法從他正受善淨心從初堅持此三, 宮: 於諸受戒能善護持善護持故心無有悔從他正受善淨心此二是法若犯即懺從初堅持此二隨法從他正受善淨心從初堅持此三}
