body:
  text: 北涼中印度三藏曇無讖於姑臧譯菩薩地持次法方便處淨心品第三菩薩於諸衆生有七種憐愍名第一真實一者無畏二者巧便三者不厭四者不求五者不貪六者廣大七者平等菩薩不以畏故於諸衆生起憐愍心修身口意業安樂衆生是名無畏菩薩以巧便慧於諸衆生起憐愍心非法非律非真諦不教非處是名巧便菩薩於諸衆生一切方便而不疲厭是名不厭菩薩於諸衆生起憐愍心無所悕求是名不求菩薩於諸衆生起憐愍心不求恩報是名不貪菩薩於諸衆生起憐愍心不限衆生於衆生所得饒益不饒益悉不棄捨是名廣大菩薩於諸衆生起憐愍心等衆生界無有方限是名平等菩薩成就如是七種憐愍是名第一真實菩薩於佛法僧方便觀察得決定解是名淨心略説有十五種一者無上心二者戒心三者波羅蜜心四者真實義心五者神力心六者安心七者樂心八者解脫心九者堅固心十者不虛心十一者不淨心十二者淨心十三者快淨心十四者調伏心十五者俱生心專樂佛法僧寶淨心是名無上受菩薩戒律淨心是名為戒行施忍精進禪定智慧淨心是名波羅蜜人無我法無我人法無我第一義法甚深淨心是名真實義諸佛菩薩不思議神通力俱生力淨心是名神力於諸衆生欲以善法饒益是名為安於諸衆生欲以攝取饒益是名為樂於諸衆生離於貪心及與受報是名解脫於無上菩提其心堅固是名堅固利衆生方便開覺方便不顛倒智俱解脫是名不虛解行地菩薩心是名不淨淨心地乃至決定行地菩薩心是名為淨究竟地菩薩心是名快淨彼不淨心是名調伏淨心快淨心思惟是名俱生性自真實身心清淨故名俱生是名十五淨心此十五淨心隨一切地略説作十事無上心淨修三寶惠一切種行修一切菩提具第一真實戒心受菩薩戒律乃至捨命終不毀犯若有所犯即能除滅波羅蜜心諸善根法常勤修習不放逸住真實義心以不染心為衆生故受於生死不捨涅槃解脫淨心神力心淳厚淨信開覺及修生死想念多住聞思知量知足安心樂心解脫心一切種利益衆生而不疲厭堅固心熾然精進廣大精進平等方便不緩方便不斷方便不虛心疾得神通彼彼善法不以少心下心而生足想調伏心生俱生心俱生心疾得阿耨多羅三藐三菩提利益安樂諸天世人調伏心攝不淨心俱生心攝淨心快淨心若世尊説菩薩淨心施設顯示一切皆是十五淨心所攝過去未來現在菩薩得無上菩提已得當得今得一切皆是十五淨心無餘無上如是十五淨心有大果福利依是得無上菩提菩薩地持次法方便處住品第四已説菩薩種性乃至菩薩所學而學菩薩相菩薩翼菩薩淨心今當略説菩薩十二住攝一切住一切菩薩行第十三如來住無上住云何菩薩十二住一者種性住二者解行住三者歡喜住四者增上戒住五者增上意住六者增上慧住增上慧住有三種一者菩提分法相應二者諦相應三者緣起生滅相應菩薩真實觀真實智謂知衆生生苦滅苦是故菩薩於三門三種慧三種住九者有行有開發無相住十者無行無開發無相住十一者無礙住十二者最上菩薩住如是十二住攝一切住一切菩薩行如來住者過一切菩薩住阿惟三佛住如來住後安立品廣説十二住菩薩所建立今當説云何種性住是菩薩性自賢善性自能行功德善法性賢善故率意方便諸善法生不待思惟然後能得種性菩薩是一切佛法種子一切佛法種子在於身中離麁煩惱種性住菩薩雖起上煩惱纏終不能行五無間業及斷善根種性義如種性品説是名種性住云何解行住是菩薩初發心未得淨心地未得淨心地菩薩所有諸行是名解行住種性住菩薩於餘菩薩住及如來住生因攝因非方便亦非得亦非清淨何況如來住解行住菩薩於餘菩薩住及如來住是方便而非得亦非清淨唯得解行及清淨向解行住菩薩淨修歡喜住得前方便及清淨向歡喜住菩薩淨修增上戒住得前方便及清淨向如是廣説乃至最上菩薩住當如是知最上菩薩住次第淨修如來住前方便如來住頓得及清淨是為菩薩住如來住差別云何歡喜住菩薩淨心住是名歡喜住云何增上戒住菩薩因淨心性戒具足住云何增上意住菩薩因增上戒淨世俗禪三昧正受住云何菩提分法相應慧住菩薩因世俗淨智真實三昧真諦覺正念處等三十七菩提分法觀察住云何諦相應慧住菩薩因菩提分法觀察真諦慧住云何緣起生滅相應慧住菩薩真諦覺為增上已有因緣苦生有因緣苦滅觀察性住云何有行有開發無相住菩薩三種增上慧為增上已有行有開發不斷無間一切法如離諸妄想修慧俱住云何無行無開發無相住即此無相住多修淳至不斷無間增長道隨順住云何無礙住菩薩依快淨不動智慧三昧於佛所説無上方廣章句義辭分別觀察住云何最上菩薩住菩薩住究竟菩薩道得阿耨多羅三藐三菩提大法灌頂一生相續若最後身於此住次第得無上菩提作一切佛事住解行住菩薩修少行斷行不定行所得有退轉歡喜住乃至三種慧住菩薩修廣行不斷行決定行所得不退轉有行有開發無相住乃至最上菩薩住菩薩修無量行不斷行決定行所得不退轉解行住菩薩無相修方便歡喜住乃至增上慧住菩薩得無相修第一無相住第二無相住菩薩無相修淨無礙住最上菩薩住菩薩無相修果解行住菩薩行解行時有何行相解行住菩薩行解行時以思惟力菩薩所作方便思惟修習不能性自真實堅固不退不得菩薩不退轉修如修如是修果種種無礙神通解脫三昧正受悉皆不得亦未離五恐畏所謂不活畏惡名畏死畏惡道畏大衆畏思惟修習利益衆生不能自性哀愍或時起邪身口意業有時貪著五欲境界有時慳惜所有衆具由佛菩薩生於淨信不能自起真實智慧所謂三寶功德真實義諸佛菩薩神通力若因若果若得義若得方便若境界少聞少思智慧成就不能無量或時忘失成就菩薩遲苦之道不能專精行大菩提熾然方便深樂淨信於可喜不可喜色聲香味觸法或顛倒受生二身中間或時受誦持法久作久修於此三事忘失正念或時黠慧受持正法善解其義或時不解或不善知隨順調伏或復不知自生佛法率意説法教授教誡以率意故不如實知或時虛説如暗中射或中不中或時退捨大菩提心或時受菩薩戒還復毀犯或時能作利益衆生方便或時厭惓是故於方便退樂於自樂或時思惟知樂衆生缺減而不能斷或有除斷而數數缺減或時能説菩薩法藏或時聞説深妙之法而生恐怖動搖疑問於一切衆生遠離大悲少能安樂不能廣大不能如上所説學菩薩所學滿足菩薩相菩薩翼菩薩淨心去阿耨多羅三藐三菩提遠不能淨心深樂涅槃捨離生死不動善根菩提分法悉不成就如是等是名解行住菩薩行相解行住菩薩行下忍時如上所説行相增行中忍時中行上忍時下如是行上忍時斷此行相次第入歡喜住方便得歡喜住彼一切法悉無復有住解行住所説相違一切不染污分法成就名淨心住解行住菩薩有軟中上方便展轉淨解脫非無罪清淨何以故彼解脫有種種煩惱上纏生故歡喜住菩薩解脫煩惱上纏斷離煩惱清淨解脫生云何歡喜住菩薩行相是菩薩於解行住入歡喜住先善入無上菩提願善入菩提方便修習決定決定有六種一者能自修習起菩提願超餘一切淨願二者無等不共果超餘一切世間境界三者隨度諸衆生苦不共一切聲聞緣覺四者發一念願性自然樂無量淨法及無厭行五者得無盡願常不退轉六者增長勝分究竟大菩提是名真願真願菩薩有四事一者何等人發心二者緣何發心三者發心有何相四者發心有何福利解行住菩薩修習一切種善根出生菩提正行而發心是名略説人發心於未來世疾滿足一切種菩提具滿足菩薩利益衆生事滿足無上菩提一切行滿足一切佛事而發心是名略説緣發心菩薩發心疾滿足一切種菩提具菩薩利益衆生事無上菩提一切行一切佛事過凡夫地入菩薩位生如來家名為佛子決定究竟無上菩提得不壞淨生歡喜心離非律儀貪恚等心一切種利益衆生一切種菩提具佛法佛事神力滿足淨心攀緣意解次第自見彼法疾行隨順生歡喜心持諸善根出家饒益平等離欲身心攝受歡喜熾然善法成就近無上菩提清淨淨心於大菩提生歡喜心菩薩決定心生離五恐畏修無我智我想不生云何當有我愛衆具愛是故離不活畏不於他人有所求欲常欲饒益一切衆生是故離惡名畏離於我見我想不生是故離死畏此身命終於未來世必與諸佛菩薩共會是故離惡道畏觀於世間無與等者況復過上是故離大衆畏如是離五恐畏已亦得遠離聞深法畏憍慢貢高他不饒益恚恨貪喜皆悉遠離不染污不雜行一切善法一切種精進方便淨信現在修行於未來事生十大願十大願如前菩提分品説此歡喜住淨修生一者以清淨心常願供養一切諸佛二者受持守護諸佛正法三者勸請諸佛轉未曾有法四者順行菩薩正行五者一切器具足成熟六者一切世界悉能現化七者自淨佛土八者一切菩薩同一方便以大乘化九者利益衆生一切不空十者一切世界得阿耨多羅三藐三菩提作一切佛事如是大願能生無量百千大願不離衆生界不離順世間此諸大願生生常行終不忘失現法方便精進修淨住十法歡喜住淨修生一者一切佛法不壞信二者方便觀緣起苦陰衆生生大悲心三者觀苦衆生令得解脫生大慈心四者以大慈悲欲度一切受苦衆生自捨己身不捨衆生捨內外物而行布施五者為度衆生故勤求世間出世間法心不厭惓六者心不厭惓故知一切論七者知一切論故知軟中上衆生隨其所應知世間八者隨所應已知時知量生慚愧心九者如是方便得勇健力十者得世財利供養如來如是十法淨歡喜住所謂信悲慈施不厭知論知世間慚愧勇健供養如來菩薩修此十法於餘九住增上戒住等觀察一切種道功德過惡求佛菩薩所有神通樂不壞道善攝行得依過一切住得大菩提為大導師度脫生死曠野衆生教令入行入行已得得已果福利成名為依住此住者有二因緣見無量佛聞菩薩藏説則能解知知十方無量世界種種佛名名麁淨信見乃至得真實見是名一因緣復作是願彼佛出世我當生彼隨願往生如是麁淨信見以願力故見諸如來一切種供養樂具饒益隨其所能隨其力供養法僧於如來所聽受正法聞已受持法次法向以四攝事成熟衆生一切善根回向菩提以三種清淨故彼諸善根轉復清淨如來法僧供養攝受以四攝事成熟衆生一切善根回向菩提無量億百千劫淨於身心譬如真金如是如是著於火中工師鍊治轉增明淨菩薩善根轉增清淨亦復如是若更受生為轉輪王王閻浮提隨意自在遠離慳貪亦化衆生離於慳垢以四攝事攝取衆生普令衆生得第一義若欲精進捨家財物於佛正法出家學道於一念頃能具菩薩百三昧能以三昧見百佛世界以神通智力能動百佛世界身亦能過光明普遍能化一身為百成熟衆生能住壽百劫能知過去百劫事能知陰界入各百法門化百菩薩以為眷屬若以願力神力所作則有無量億百千劫不可數知是名略説歡喜住所謂決定四事大願出生方便精進出生修淨住法彼彼住淨修見佛善根受生神力廣説如修多羅十地歡喜地説修多羅説十地即此菩薩藏摩得勒伽説十住攝受衆生故説地自受行住故説住云何增上戒住菩薩行相是菩薩於歡喜住得十種淨心一者一切種供養尊重福田先語問訊心二者同法菩薩親近樂住心三者勝一切煩惱諸纏魔業心四者見一切行過惡心五者見涅槃福利心六者常修菩提分法善根心七者隨順修菩提空間淨處心八者不念世間貪愛貢高利養心九者離聲聞乘向大乘心十者一切種利益衆生心如是十種心生名得淨心如是淨心滿足次第入增上戒住入增上戒住已性戒具足轉邪業迹所攝惡戒一切不行況復中上如是性戒具足染污不染污業善趣惡趣業迹因處果處如實知報果依果及彼業如實知自斷十惡行十善業復以此法教授衆生毒業過患惡衆生界等無差別善業惡業第一義苦種種衆難得廣大哀愍見佛善根清淨如前説譬如真金得加私藥著於火中轉增明淨菩薩善根清淨亦復如是此住清淨心成就受生作轉輪王王四天下以自在力令諸衆生離諸惡戒行善業迹神力十事如修多羅説是名略説增上戒住所謂淨心性戒具足離一切惡戒離一切業迹一切因果如實知分別四種業教授衆生衆生界善惡業生苦衆難得廣大哀愍見佛善根清淨受生神力廣説如修多羅十地離垢地説離惡戒垢故名離垢彼離垢地即是增上戒住云何增上意住菩薩行相是菩薩於增上戒住得十種思惟十種思惟滿具足已過增上戒住入增上意住一者淨十種淨心二者離十種不淨心三者一切有漏法能生厭離四者知修對治法五者修對治法不退轉六者堅固對治勝一切有漏一切魔業七者於諸佛法無有退弱八者於諸苦行不以為難九者信解大乘不樂小乘十者一切種利益衆生增上意住菩薩觀一切行無量過惡生於厭離觀佛智慧功德福利生於正念淳淨信心觀衆生界種種苦行悲念衆生而依於義於有為行不為放逸於大菩提熾然精進於諸衆生生大悲心令諸衆生究竟脫苦觀察一切煩惱障礙解脫正智觀察法界一切妄想煩惱所起對治智慧成就智慧三昧等觀聞菩薩藏以為方便因聞方便勤修精進聞正法故不惜身命無內外物而不布施無有尊重而不恭敬無有正教而不奉行無有身苦而不求法以愛念心聞一四句偈勝於愛念三千大千世界大珍寶聚若聞一偈正向佛道淨修菩薩行勝得一切轉輪聖王護世帝釋魔梵諸王若有人言我有此法正向佛道淨修菩薩行若能投大火坑受大苦者當為汝説菩薩聞已歡喜樂受作是念若聞正法正向佛道淨修菩薩行正使三千大千世界大火熾然乃至梵天尚入其中況復小火經地獄苦尚求佛法況復小苦如是精進方便思惟求法如法次法向隨順佛法不以文字音聲清淨作是念已因聞正緣法相離欲惡不善法得世俗四禪四無色四無量五神通捨諸禪三昧正受以願力故來生欲界觀彼衆生能滿菩提分法者而生彼處離欲故欲縛斷捨諸禪正受故有縛斷解行住先如是法如解脫見縛斷耶貪恚癡畢竟不行見佛善根清淨如前説譬如真金數被鍊治離垢明淨菩薩善根轉增清淨亦復如是若更受生得帝釋身以離欲善法調伏衆生神力勝前諸住百千萬倍是名略説增上意住所謂十種思惟成就入一切行衆生界大菩提正分別真實苦解脫方便正求大恭敬求法法次法向巧便出生諸禪三昧正受神通捨於諸禪以願力故隨所欲生見佛善根清淨受生神力廣説如修多羅十地明地説聞行法行法明照三昧明照故名明地內心清淨故名增上意住彼明地即此增上意住云何菩薩菩提分法相應增上慧住是菩薩於增上意住得十法明增上滿足已入初增上慧住十法明如修多羅説謂平等第一義若煩惱惱若清淨淨煩惱繫惱無上清淨淨是名略説法明義住此住者十智成熟不壞淨為首如修多羅説十智成熟生如來家逮得自在十智觀察為增上已修念處等三十七菩提分法如修多羅説修集彼法故身見等離陰界入微細愛著畢竟不生如來不稱歎業一切不行所稱歎者一切隨順如如真實心轉柔和修種種行其心快淨知恩報恩隨順功德種種淨法皆悉成就修上地業得大精進因彼精進淨心深心信解滿足因彼正法外道魔怨不能傾動見佛善根清淨如前説譬如真金為莊嚴具餘金不及菩薩善根亦復如是勝餘下地菩薩功德如育多摩尼光明清淨餘珠不及一切風雨所不能滅如是菩薩下地菩薩聲聞緣覺智慧光明所不能及魔怨煩惱皆不能壞若更受生作焰摩天王以諸善法教化衆生破身見等神通力勝於前住百千萬倍是名略説菩提分法增上慧住所謂十法明成就入十種成熟修菩提分法身見等一切著斷制業聽業若離若修因彼心轉柔和隨順功德皆悉成就修上地業得大精進因彼精進淨心深心信解清淨因彼正法魔怨不動見佛善根清淨受生神力廣説如修多羅十地焰地説彼地菩提分法智焰種正説法智明照世間是故彼地名為焰彼焰地即此菩提分法相應增上慧住云何菩薩諦相應增上慧住是菩薩於初增上慧住得十平等淨心增上滿足已入第二增上慧住十平等淨心如修多羅説謂無等等覺超餘衆生於法如等是名略説平等淨心義住此住者智慧增進於四聖諦有十種如實知如修多羅説若緣他若自知若俱知如修多羅毗尼摩得勒伽説現在苦苦因苦因滅苦因滅方便道是名略説十種四聖諦知是諦方便破壞一切有為行於諸衆生大悲增長前際後際於四真諦愚惑邪向令入解脫功德智慧衆具成熟修行正願正念正智正説等種種真實功德增長無餘思惟一切種成熟方便成熟衆生攝衆生故修世俗書論如修多羅説以工巧業一切出生悲心誘進安立菩提隨順世間方便惠施四大錯亂非人所持令得休息無罪戲樂衆具饒益因此饒益引令樂法以住止衆具而為饒益王賊所惱度令安隱處非處方便若聽若制吉非吉事惠施成就現法展轉清淨饒益諸顛倒者為説正道是名攝受衆生世俗工巧平等義見佛善根清淨如前説譬如真金衆寶廁填光明清淨勝於餘金如是菩薩智慧方便勝餘菩薩聲聞緣覺譬如日月宮殿一切風輪不能令失如是菩薩智慧方便不為世法之所毀壞若更受生為兜率天王以諸善法破壞一切外道邪法神通力勝於前住億百千倍是名略説諦相應增上慧住所謂平等淨心成就入諦觀增長破壞諸行於諸衆生大悲增長功德智慧衆具成熟正願正念正智正説等功德增長無餘思惟一切種成熟方便成就衆生工巧出生見佛善根清淨受生神力廣説如修多羅十地難勝地説決定智慧難勝是故彼地名為難勝彼難勝地即此諦相應增上慧住云何菩薩緣起相應增上慧住是菩薩於諦相應增上慧住得十平等法增上滿足已入第六住一者一切法第一義自性平等二者無言説行無相平等三者無生平等四者因緣不起平等五者畢竟寂滅平等六者離諸虛偽平等七者一切行無取無捨平等八者一切法離平等九者妄想境界如幻如化平等十者妄想境界有無無二平等是名略説十平等法住此住者於諸衆生大悲增長專樂菩提知諸世間合散生滅緣起正行了知依緣出生智慧及三解脫門空無相無願依三三昧離我我所知者作者有性無性相如是第一義方便思惟衆生煩惱結縛因緣和合有為危脆著我我所生諸過惡離煩惱結縛因緣和合自護故不滅一切有為攝衆生故如是智慧慈悲隨順住無障礙解脫般若波羅蜜住無礙智解脫已於一切世間行無礙如是住者名第七地菩薩方便行忍隨順忍所攝住無障礙解脫般若波羅蜜修菩提因緣不退轉世俗有為一切不住亦不住彼休息寂滅如是方便智慧隨順入空三昧門百萬空三昧門現在前如空三昧無相無願三昧門亦如是此諸三昧門現前已得不壞心一切種佛法殊勝外道魔怨所不能壞餘如前説譬如真金衆寶廁填勝於餘金如是菩薩善根清淨勝於一切譬如月光除衆生惱一切風輪不能障蔽菩薩智慧光明為諸衆生息煩惱火一切魔怨不能斷絶若更受生為善化自在天王常以善法滅除衆生一切憍慢神通力勝前億百千倍是名略説緣起相應增上慧住所謂平等法成就入覺諸緣起生解脫門離諸邪想方便攝受住無障礙解脫般若波羅蜜得無量三昧得不壞心佛法殊勝見佛善根清淨受生神力廣説如修多羅十地現前地説無礙智現前是故彼地名為現前即此地名為緣起相應增上慧住云何菩薩有行有開發無相住是菩薩於緣起相應增上慧住具足十方便慧次第出生世間共不共勝進道增上滿足已入第七住十方便慧如修多羅説謂出生世間善法攝受福德安樂衆生福德衆具菩提分法悉得增長不共一切聲聞緣覺知衆生界法界世界如來身口意是名略説方便慧出生道如是功德次第勝進入無量無數如來境界所起處無開發無相想見無量佛境界所起處無間無斷修習一切威儀行住思惟不離一切處道於念念中具足十波羅蜜及一切菩提分法非如餘住第一歡喜住修習正願第二住離惡戒垢第三住願轉增長得法光明第四住入道第五住入世間所作第六住入甚深法門此第七住起一切佛法滿足助菩提法是菩薩方便行滿攝受住智神通清淨行菩薩於此住次第入清淨第八住住第八住者一向清淨第七住雜淨方便入不染污名不染污行此第七住貪等煩惱斷故不名有煩惱不得佛智慧如實心清淨故不名離煩惱此第七住成就無量身口意業如佛所歎業如前説五住所得世間工業智自然滿足為三千大千世界大師唯除上地菩薩及如來餘無及者一切禪定菩提分法皆現前修而不受報菩薩於此住思惟方便入善伏三昧生百萬三昧超過一切聲聞緣覺三昧境界遠離煩惱諸妄想行隨順甚深身口意業不捨方便勝進之道顧念衆生滿足菩提離一切相無量身口意業生淨修無生法忍於此住超過自覺境界餘六住佛法攀緣第六住菩薩能入寂滅今住此地念念寂滅而不證寂滅得未曾有身口意業不思議實際而不證實際如是方便智生為增上已行共一切衆生行照明世間餘如修多羅説取要言之為功德事親屬想攝受修習勝進住三解脫求下乘者方便調伏受五欲者求殊勝欲轉諸邪見隨順正念於諸大會皆悉隨順餘如前説譬如真金一切摩尼衆寶廁填勝閻浮檀金菩薩善根清淨勝於一切聲聞緣覺及餘離垢菩薩譬如日光照閻浮提一切濕穢皆令乾消勝於餘光是菩薩智慧光明能令衆生煩惱乾消勝於一切聲聞緣覺及餘菩薩智慧光明若更受生作他化自在天王以智慧饒益一切神力勝前億百千倍是名略説有行有開發無相住所謂方便慧勝進道成就入入如來境界所起處無間方便於念念中具菩提分法染污不染污建立方便行滿足攝受淨身口意業一切世間工巧業滿足得無量三昧不共一切聲聞緣覺念念寂滅行於一切共世間行見佛善根清淨受生神力廣説如修多羅十地遠行地説方便行滿足是故彼地名為遠行即此地名為有行有開發無相住云何菩薩無行無開發無相住是菩薩於初無相住得十種入一切法第一義智如修多羅説謂三世法如所應無生無起無相無成第一義離言説自性不知言説行自性相生無智邪見計著知離言説事初中後一切時煩惱平等入離妄想平等一切煩惱悉皆遠離是名略説入第一義智此十種智增上滿足已入第八清淨住是名得快淨第一無生法忍菩薩復有四種求求一切法四種如實知知一切法以求知故離一切妄想計著現法一切煩惱不起來世一切究竟不生妄想計著四種求四種如實知如前真實品説從解行住乃至有行有開發無相住未得快淨於此住乃得快淨是故名第一無生法忍得無生法忍已得甚深行離初無相住四種惱患一者有行有開發二者淨地勤方便三者一切衆生利益堪能勤方便四者微細想行是故此住名為快淨於甚深法門法流水中如來勸發出生無量門智慧神通諸業饒益以勸發故無量尊身智慧出生得十自在如修多羅説得自在故欲久近住隨意即能諸禪解脫隨意所欲資生衆具世工巧業悉得隨意一切生處一切受生隨意往生一切神力一切誓願隨意能得變一切物成於金寶隨意能成欲知法界名身句身味身於一切法建立巧便即能知之如是自在力果報福利如修多羅説於念念中常等見佛善根清淨受生神力金光明喻如修多羅説是名略説無行無開發無相住所謂第一義智成就入得不起法忍惱亂悉離得快淨住甚深法門諸佛勸發出生無量智慧神通諸業饒益無量尊身智慧出生得大勢力得大自在力福利果報善根清淨受生神力廣説如修多羅十地不動地説離有行有開發乘不動勝進道是故彼地名為不動即此地名為無行無開發無相住云何菩薩無礙住是菩薩樂深解脫上勝進智知佛法藏菩薩一切種行為人廣説於所説法所可為説悉如實知所可説法煩惱清淨誰惱誰淨悉如實知如是善説法名大法師得無量陀羅尼善諸音聲辨才無盡法陀羅尼攝受堪能成就乃至出生菩薩無礙智坐於法座所可説法衆生樂受堪能成熟如修多羅説善根清淨受生神力如修多羅説是名略説菩薩無礙住所謂樂深解脫説法行智不思議大法師善根清淨受生神力廣説如修多羅十地善慧地説安樂一切衆生淨修菩薩無礙廣説大法是故彼地名為善慧即此地名為無礙住云何最上菩薩住是菩薩於無礙住淨修一切種法王所應灌頂法得離垢等無量三昧作所應作最後益一切智灌頂三昧現在前得一切佛同坐身蓮華眷屬光明普照得一切種一切智灌頂一切剛強悉調伏得解脫方便佛所住智無量解脫總持神通得大念智言辭部分及大神通善根清淨受生神力是名略説最上菩薩住廣説如修多羅十地法雲地説法雲地菩薩滿足菩薩道滿足菩提衆具得菩薩勝慧興大法雲以正覺自覺雨諸衆生煩惱垢穢悉令休息種種善根增長成熟是故彼地名為法雲即此地名為最上菩薩住如上説展轉上功德前地所無彼一一住若中上根者一一經億百千大劫多有成就軟根者不在數中彼一切住要經三阿僧祇大劫初阿僧祇大劫解行住過得歡喜住五行勝進第二阿僧祇大劫歡喜住乃至有開發無相住過得無開發無相住此即決定淨心菩薩決定勝進第三阿僧祇大劫無開發無相住及無礙智住過得最上菩薩住劫有二種一者日月晝夜時節歲數無量故名阿僧祇二者大劫無量故名阿僧祇彼歲數阿僧祇劫是前阿僧祇菩薩所過後三阿僧祇大劫無有過若菩薩增上精進能轉中劫不能轉大劫如是十二住菩薩三阿僧祇大劫煩惱障分染污智障分染污斷彼三住煩惱障分染污斷歡喜住惡趣煩惱分斷增上中煩惱分一切不行無開發無相住無生法忍清淨相續煩惱染污分一切不行最上菩薩住一切煩惱習使障斷入如來住智障染污分有三種一者皮二者膚三者骨歡喜住斷皮障無開發無相住斷膚障如來住斷骨障一切障清淨於此三住智障斷餘住隨其次第真實莊嚴如是十三住有十一種淨第一種性淨第二解行淨第三淨心淨第四戒淨第五意淨第六第七第八正見淨第九方便行滿足淨第十真實智神通出生淨第十一正義無盡説無礙淨第十二隨順一切種一切所知智淨第十三如來住一切煩惱障習使智障習使淨如前菩薩功德品説八法攝一切摩訶衍菩薩藏所攝此十三住攝第一第二住信心生解行住於菩薩藏得聞慧思慧第三住得淨心及初修慧行第四住乃至第九有行有開發無相住修惠廣第十第十一第十二住淨修慧行所攝修慧果成如來住畢竟出離聲聞住法亦有十二如菩薩次第當知一者聲聞自種性住二者入正未越次取證方便住三者越次取證住四者得不壞淨未聖戒轉上漏盡住五者依增上戒增上意學出生住第六第七第八得真諦智增上慧學住九者觀察生死無相三昧方便住十者究竟無相住十一者解脫覺處住十二者一切種阿羅漢住次法方便處淨心品第三菩薩有七種愛念衆生若成就此愛念者名真實心第一真實心一者無畏二者巧便三者不厭四者不求五者不貪六者廣大七者平等菩薩未曾恐畏故於諸衆生起愛念心身口意業隨順行愛念安樂是名無畏菩薩未曾無巧便而行愛念所謂非法非律非真諦行教授非處是名巧便菩薩愛念為諸衆生一切所作而不疲厭是名不厭菩薩無請而愛念衆生是名無求菩薩以無貪心而行愛念不求恩報及未來愛果是名無貪愛念菩薩於諸衆生廣大愛念不限衆生於衆生所得饒益不饒益悉不棄捨寧自苦身不苦衆生是名廣大又彼相成就愛念衆生是名平等愛念不限衆生界是名平等愛念菩薩成就如是七種愛念是名真實心第一真實心菩薩方便觀佛法僧若意解正向決定是名極淨心又彼極淨心略説有十五種一者無上心二者隨轉心三者波羅蜜心四者真實義心五者神力心六者安心七者樂心八者解脫心九者堅固心十者不虛偽心十一者不淨心十二者淨心十三者快淨心十四者調伏心十五者俱生心菩薩於佛法僧寶極淨心是名無上心受菩薩戒於受持律儀極淨心是名隨轉心於行施忍精進禪定智慧極淨心是名波羅蜜心人法無我第一義真實甚深極淨心是名真實義心於諸佛菩薩不思議神通力俱生力極淨心是名神力心於諸衆生欲以善法饒益是名安心於諸衆生欲以攝取饒益是名樂心於諸衆生捨離貪心及與受報是名解脫心於無上菩提起一向心是名堅固心利衆生方便菩提方便不顛倒智俱生解脫是名不虛偽心一切解行地菩薩極淨心是名不淨心從淨心地乃至決定行地菩薩極淨心是名淨心究竟地菩薩極淨心是名快淨心彼不淨心是名調伏心思量計數是名降伏心淨心快淨心極淨心是名俱生心性自清淨於身安立故名俱生心是名十五極淨心是名十五真實淨心隨一切地略説作十事謂無上心一切種供養三寶一切菩提衆具無上真實隨轉心受菩薩戒律儀乃至捨命終不故犯若有所犯即能除滅波羅蜜心勤修善根住不放逸真實義心以不染污心為衆生故久住生死終不悕望涅槃解脫神力心顯示正教令起淨信及得修慧多住生死想非少聞思知足安心樂心解脫心一切種種利益衆生而不疲厭堅固心熾然精進廣大精進平等方便不緩方便不斷方便不虛偽心疾得神通生彼彼善根不以少心下心勝劣善根而生足想降伏心起俱生心俱生心疾得阿耨多羅三藐三菩提利益安樂諸天世人降伏心攝不淨心俱生心攝淨心快淨心若世尊説菩薩淨心施設顯示一切皆是十五淨心所攝是故過去未來現在菩薩得無上菩提已得當得今得一切皆是十五淨心無餘無上如是十五淨心有大果福利依是得無上菩提次法方便處住品第四如是從種性起如所説菩薩學菩薩相現菩薩翼方便成就菩薩極悕望淨今當略説菩薩十二住此菩薩住攝一切菩薩行第十三是阿耨多羅三藐三菩提無上住云何菩薩十二住一者種性住二者解行住三者歡喜住四者增上戒住五者增上意住六者菩提分法相應增上慧住七者諦相應增上慧住八者緣起生滅相應增上慧住若菩薩真實觀觀真實若不觀真實則衆苦增若觀真實則衆苦滅菩薩於三門行智慧為三增上慧住九者有行有開發不斷道向無相住十者無行無開發道向無相住十一者無礙住十二者最上究竟住如是十二住攝一切菩薩住一切菩薩行如來住者過一切菩薩住阿惟三佛菩提住彼最後如來住建立品廣説菩薩十二住隨其建立今當説云何種性住謂菩薩種性住者菩薩功德菩薩所應善法成就及行性賢善故率意方便諸善法生不待思惟率然自得種性住為一切佛法種子持一切佛法種子悉在身中離麁煩惱種性住菩薩終不復起煩惱上纏行五無間業及斷善根種性義如前種性品廣説是名種性住云何解行住謂菩薩從初發心不淨心及淨心菩薩所行是名解行住種性住菩薩於餘一切菩薩十一住及如來住為因轉為因攝受於餘菩薩非方便亦非得亦非淨彼何況如來住解行住菩薩於一切菩薩住及如來住是方便而非得亦非清淨唯得解行住及清淨向解行住淨已得歡喜住前方便及即彼淨向歡喜住淨已得增上戒住前方便及即彼淨向如是廣説乃至最上菩薩住當如是知最上菩薩住淨已次第得如來住前方便頓得及淨是為菩薩住如來住差別云何歡喜住菩薩極淨心住是名歡喜住云何增上戒住菩薩因極淨心性戒具足住云何增上意住菩薩因增上戒淨得世俗禪三昧正受住云何菩提分法相應增上慧住菩薩依世俗禪三摩提淨覺了真諦正念處等三十七菩提分法觀察住云何諦相應增上慧住菩薩因依菩提分觀察如實覺了真諦住云何緣起生滅相應增上慧住菩薩以真諦覺為增上已以智觀察有因苦有因苦滅智住云何有行有開發無相住菩薩以三種增上慧為增上已有行有開發不斷無間一切法如離諸妄想修慧俱住云何無行無開發無相住即此無相住多修淳至不斷無間升進道隨順住云何無礙住菩薩即依彼快淨不動智慧三昧得智慧增廣為人説法無上方便於法義辭分別觀住云何最上菩薩住菩薩住彼究竟菩薩道阿耨多羅三藐三菩提大法灌頂一生相續若最後身於此住次第得無上菩提作一切佛事住解行住菩薩於菩薩修少行斷行不決定修行所得有退轉歡喜住乃至三種增上慧住於菩薩修廣行不斷行決定行所得不退轉有行有開發無相住乃至最上菩薩住於菩薩修無量行不斷行決定行所得不退轉解行住菩薩無相修方便歡喜住乃至增上慧住菩薩行無相修第一無相住升進第二無相住菩薩無相修淨無礙住最上菩薩住菩薩無相修果解行住菩薩行解行時有何行何狀貌何相解行住菩薩行解行時以思惟力菩薩所作方便思惟慧修習不能性自真實堅固不動不退不得菩薩不退轉修如修如是修果種種無礙神通解脫三昧正受悉皆不得亦未離五恐畏所謂不活畏惡名畏死畏惡道畏大衆畏思惟修習利益衆生不能性自哀愍或時起邪身口意業有時貪著五欲境界有時慳惜所有衆具由佛菩薩生於淨信不能自起真實智慧所謂三寶功德真實義諸佛菩薩神通力若因若果若得義若得方便若境界少聞少思智慧成就不能無量或時失念成就菩薩遲喜之道不能專心求大菩提熾然精進深樂淨信或於三處忘失正念所謂於可喜不可喜色聲香味觸法或時顛倒受生彼身中間或受誦持法久作久説以此因緣忘失正念或時黠慧受持正法善解其義或時不爾或不善知隨宜調伏方便或復不知自生佛法方便率意説法教授教誡以率意故不如實知或時虛説不時不中如暗中射或中不中或時退捨大菩提心或時起菩提心而復退捨或時受菩薩戒而復還捨或時能作利益衆生成就而復厭倦是故利益方便退常樂自樂思惟然後欲樂衆生自知缺減而不能斷令無有餘更數缺減或時於菩薩法藏信受他語或時聞説深妙之法而生恐怖動搖疑問或時於一切衆生遠離大悲少能安樂利益衆生不能廣大不能如上所説學菩薩所學不能滿足菩薩相菩薩翼方便菩薩真淨去阿耨多羅三藐三菩提遠不能淨心深樂涅槃捨離生死不動善根菩提分法悉不成就如是等行相名解行住菩薩行相解行住菩薩行下忍時如上所説行相增行中忍時中行上忍時下如是行上忍時斷此行相次第入歡喜住方便得歡喜住彼一切法悉無復有住解行住所説相違一切不染污分法成就名淨心住解行住菩薩有軟中上方便展轉淨解脫非無罪清淨何以故彼解脫有種種上煩惱生故歡喜菩薩解脫上煩惱斷離煩惱清淨解脫生云何歡喜住菩薩行相是菩薩於解行住當入歡喜住是菩薩先善入無上菩提願善入菩提方便修習決定若復緣他而進捨不決定未習得六種善決定緣自力修慧菩薩願生一者超餘一切淨願無等不共二者亦是世間亦出世間一切境界三者隨度諸衆生苦不共一切聲聞緣覺四者發一念願法性自然無量淨果不動轉五者不變異無盡願終無能令退轉變異六者勝進分究竟大菩提願是名菩薩決定願又彼菩薩發心當知四種初何等衆生發心緣何發心發心有何相發心有何福利此四種發心當知彼解行住菩薩一切種善修習善根略説正菩提行出生而發心是名略説衆生發心於未來世等速疾菩提衆具滿足一切菩薩所作滿足無上菩提一切佛法滿足所作佛事滿足是名略説緣發心正速疾一切種一切菩提衆具隨順菩薩於衆生一切種菩薩所作隨順無上菩提得自覺知隨順一切佛事隨順而發心彼發心過一切億衆菩薩及凡夫地入菩薩超升離生生如來家為如來子決定向無上菩提決定紹如來種得如來不壞淨常多歡喜心不多瞋暴一切種菩薩所作一切種菩提具佛法佛事神力皆悉滿足淨心攀緣意解增進自見得法生歡喜心遵習善根到于出離遠離貪著無比無等攝養身心歡喜熾然善法成就近無上菩提我於大菩提悕望清淨我已遠離一切恐畏作如是念生歡喜心謂彼菩薩決定心生離五恐畏善根無我智我想不生云何當有我愛衆具愛是故離不活畏不於他人有所求欲常欲饒益一切衆生是故離惡名畏離於我見我想不生是故離死畏此身命終於未來世必與諸佛菩薩共會是故離惡道畏觀於世間無與等者況復過上是故離大衆畏如是離五恐畏已亦得遠離聞深法畏憍慢貢高他不饒益恚恨貪喜皆悉遠離不染污故無垢熾然精進故無凡悕望於現法中一切種菩薩精進方便修習上信前行於未來事生十大願十大願如前菩提分品説於此歡喜住生一者以清淨心常願供養一切諸佛二者受持守護諸佛正法三者勸請諸佛轉未曾有法四者順行菩薩正行五者為成熟衆生器六者遊諸佛剎見諸如來親近聞法七者自淨佛土八者一切菩薩同一方便以大乘化九者利益衆生一切不空十者一切世界得阿耨多羅三藐三菩提作一切佛事如是大願及餘求親衆生界無有斷絶此諸大願生生常行終不忘失如是建立前願在前後願在後是名為願菩薩如是大願作門已能生無量百千諸願如是未來諸願現法方便精進十住淨修法歡喜住淨修生一者一切佛法不壞信緣起方便二者觀純苦衆生是悲心三者我當度衆生苦陰是慈心四者欲度一切苦不顧自身不顧自身已捨內外物而行布施五者為度衆生故勤求世間出世間法心不厭倦六者心不厭倦故知一切論七者知一切論故知軟中上衆生隨其所應八者隨所應已知時知量生慚愧心九者如是方便得勇健力十者得世財利供養如來如是十法淨歡喜住所謂信悲慈施不厭知論隨衆生慚愧勇健供養如來菩薩修此十法於餘九住增上戒住等觀察一切種道功德過惡求佛菩薩所有神通樂不壞道善攝行得依相過一切住得大菩提為大導師度生死曠野教令入行入行已得得已果福利成名為依住此住者有二因緣見無量佛聞菩薩藏説則能解知十方無量世界名種種佛名麁淨信必俱見乃至得真實見是名一因緣復作是願彼佛出世我當生彼隨願往生如是麁淨信見及願力故見諸如來一切種共養樂具饒益隨其所能隨其力供養法僧於如來所聽受正法聞已受持起法次法向以四攝事成熟衆生以一切善根回向菩提以三種清淨故彼諸善根轉復清淨謂如來法僧供養攝受以四攝事成熟衆生一切善根回向菩提無量億百千劫淨於身心譬如真金如是如是著於火中工師鍊治轉增明淨菩薩善根轉增清淨亦復如是若更受生為轉輪王王閻浮提隨意自在遠離慳貪亦化衆生離於慳垢以四攝事攝取衆生普令衆生得第一義若欲精進捨家財物於佛正法出家學道於一念頃能入百三昧能以天眼見百佛世界神通智力能動百世界身亦能過光明普遍能示他人能化一身為百成熟衆生能住壽百劫能知過去百劫事能知陰界入各百法門化百菩薩以為眷屬若以願力神力所作則有無量億百千劫不可數知是名略説歡喜住所謂決定四種發心正願方便精進出生修淨住法彼彼住淨修見佛善根受生神力廣説如修多羅十地歡喜地説修多羅説十地即此菩薩藏摩德勒伽説十住攝受衆生故説地自受行住故説住云何增上戒住菩薩行相是菩薩於歡喜住得十種淨心一者一切種供養尊重福田先語問訊心二者同法菩薩親近樂住心三者勝一切煩惱煩惱魔業自在心四者見一切行過惡心五者見涅槃福利心六者常修菩提分法善根心七者隨順修菩提空間靜處心八者不念世間貪愛貢高利養心九者離下劣乘專向大乘心十者一切種利益衆生心如是十種正心生名得淨心如是淨心增上滿足次第入增上戒住入增上戒住已性戒具足軟邪業迹所攝惡戒一切不行況復中上十業迹滿足性戒成就如是自性戒慧染污不染污業迹善趣惡趣道業行因處果處如實知報果依果及彼業如實知自斷十惡行十善業復以此法教授衆生毒業過患惡衆生界等無差別善業惡業第一義苦種種衆難得廣大哀愍於此增上戒住見佛善根清淨如前説譬如真金得迦私藥著於火中轉增明淨菩薩善根清淨亦復如是於此住入清淨心悕望成就受生作轉輪王王四天下以自在力令諸衆生離諸惡戒行善業迹神力十倍勝前是名略説增上戒住所謂淨心性戒具足離一切種惡戒垢一切業迹一切因果如實知分別四種業教授衆生得廣大哀愍觀衆生界業生苦種種衆難見佛善根清淨受生神力廣説如修多羅十地離垢地説離惡戒垢故名離垢彼離垢地即此增上戒住云何增上意住菩薩行相是諸菩薩先於增上戒住得十種淨悕望思惟具足已復有十種心悕望思惟增上滿足已過增上戒住入增上意住一者思惟我尸淨十種心悕望二者思惟我於此十種淨悕望終不復退三者思惟我於一切漏有漏法心終不著厭離心住四者思惟我於彼對治修識住五者思惟我於彼對治法終不退轉六者思惟我於堅固對治終不為一切魔所勝七者思惟我於諸佛法終不生懈倦八者思惟我於諸苦行終不畏難九者思惟我一向信解大乘不樂小乘十者思惟我常樂一切衆生一切種利益是為入十種心悕望增上意住菩薩於一切行以患厭行種種對治觀佛智慧功德福利種種福利行而生愛樂淳厚心欲觀衆生果苦種種苦行顧念衆生心依於義於一切有為行不為放逸於大菩提熾然精進於諸衆生廣生大悲心云何令此衆生究竟脫苦即時觀察知住無礙解脫智者乃可得此是無礙智不離通達法界如實智慧是如實智慧不離禪定解脫三昧正受是諸禪定不離多聞決定智慧復作是念無礙解脫一切佛法以何為本不離聞為本作是念已轉加精進求法無厭為聞正法故不惜身命無內外物而不布施無有尊重而不求法以愛念心聞一四句偈勝於愛念三千大千世界大珍寶聚若聞一偈如來所説正向佛道淨修菩薩行勝得一切轉輪聖王護世帝釋魔梵諸王若有人言我有此法如來所説正向佛道淨修菩薩行若能投大火坑受大苦者當為汝説菩薩聞已歡喜樂受作是念若聞正法正向佛道淨修菩薩行正使三千大千世界大火熾然乃至梵天尚入其中況復小火經地獄苦尚求佛法況復小苦如是精進方便思惟求法如法次法向隨順佛法不以文字音聲清淨作是念已依於聞法正緣法相離欲惡不善法得世俗四禪四無色四無量五神通捨諸禪三昧正受以願力故觀察欲界彼衆生能滿菩提分法者而生彼處離欲故欲縛斷捨諸禪正受故有縛如是解行住先如是法如解見所起縛斷邪貪恚癡畢竟不行見佛善根清淨如前説譬如真金數被鍊治盡諸垢穢稱量不減離垢明淨菩薩善根轉增清淨亦復如是若更受生得帝釋身以離欲善法調伏衆生神力如前住千倍是中諸住百千萬倍是名略説增上意住所謂心思惟成就入一切行衆生界大菩提正分別真實苦解脫方便正求大恭敬求法法次法向巧便出生諸禪三昧正受神通捨於諸禪以願力故隨所欲生見佛善根清淨受生神力廣説如修多羅十地明地説聞行法行法明照三昧明照修習是故此地故名明地內心清淨故名增上意住彼明地即此增上意住云何菩薩菩提分法相應增上慧住行相是菩薩先於增上意住得入十種法明求多聞為增上滿足已過增上意住入初增上慧住彼入十種法明如修多羅説謂所可建立建立建立處第一義等若煩惱若清淨淨煩惱繫惱無上清淨淨是名略説法明義住此住者不懷悕望為首如修多羅説十智成熟法成就生如來家逮得自法一切種觀為增上已修念處等三十七菩提分法如修多羅説修集彼法故離身見等隨界入微細愛著畢竟不行如來不稱歎業一切不行所稱歎者一切隨順如如真實心轉柔軟修種種行其心快淨知恩報恩等隨順功德種種淨法皆悉成就求淨上地業得大精進因彼精進淨心深心信解滿足因彼正法外道魔怨不能傾動見佛善根清淨如前説譬如真金為莊嚴具餘金不及菩薩善根亦復如是勝餘下地菩薩功德如育多摩尼光明清淨餘珠不及一切風雨所不能滅如是菩薩下地菩薩聲聞緣覺智慧光明所不能及魔怨煩惱皆不能壞若更受生作焰摩天王以諸善法教化衆生破身見等神通力勝於前住百千萬倍此住億倍是名略説菩提分法增上慧住所謂入法明智成熟修菩提分法身見等一切著斷制業聽業若離若修因彼心轉柔和隨順功德皆悉成就求淨上地業得大精進因彼精進淨心深心信解清淨因彼正法魔怨不動見佛善根清淨受生神力此則略説廣説如修多羅十地焰地説彼地菩提分法彼地智焰種平等説法以智慧光照明世間是故彼地名為焰彼焰地即此菩提分法相應增上慧住云何菩薩諦相應第二增上慧住行相是菩薩先於初增上慧住得十平等淨心增上滿足已入第二增上慧住十平等心如修多羅説謂無等覺覺無等超餘一切衆生界法如等是名略説心平等義住此住者更求智慧勝進智慧時於四聖諦有十種如實知如修多羅説若教他若自知若俱知若説修多羅毗尼摩德勒伽方便若説現在苦因生未來苦因滅彼滅不起彼滅方便勝進是名略説十種四聖諦當知如是真諦善以智慧壞一切有為行於衆生界大悲增長前際後際愚惑四諦起於邪趣菩薩正知解脫彼故攝功德智慧衆具具足攝持彼悕望度起正念正智精進為首等種種真實功德增長無餘思惟成熟方便成熟衆生攝衆生故修習一切世俗書論如修多羅説如是功巧業一切出生悲念衆生漸次誘進安立菩提隨順世俗必定善方便破諸貧窮四大錯亂非人所惱令得休息無罪戲樂衆具饒益因此饒益引樂令法以住止衆具而為饒益王賊所惱度令安隱處非處方便若聽若制吉非吉物應施不施令得所宜現法展轉無有違諍乃至後世亦無怨結諸顛倒者為説正道是名攝受衆生世俗工巧及平等義見佛善根清淨如前説譬如成鍊真金瑩以硨磲光明清淨勝於餘金如是菩薩智慧方便勝餘菩薩聲聞緣覺譬如日月宮殿一切風輪不能令失如是菩薩智慧方便不為一切世法所勝若更受生為兜率天王以諸善法破壞一切外道邪法神通力勝於前住百億倍是名略説諦相應增上慧住所謂淨心平等成就入諦觀增長破壞諸行於諸衆生大悲增長功德智慧衆具成熟正願方便正念正智正説等功德增長無餘思惟一切種成熟方便成熟衆生世俗工巧出生善根清淨受生神力廣説如修多羅十地難勝地説於真諦決定智慧難勝是故彼地名為難勝彼難勝地即此義名為諦相應增上慧住云何菩薩緣起相應增上慧住行相是菩薩先於諦相應增上慧住得十平等法如修多羅説彼增上滿足已入於此住一切法第一義自性無相平等無言説行照曜無相平等即彼無相故自無生平等因不起平等自因不起故畢竟寂滅平等離攝受虛偽平等無取無捨離行平等妄想爾焰自性如幻如化平等離妄想智境界自性有無無二平等是名略説十平等分別義住此住者於諸衆生大悲增長於大菩提殷勤欲樂知諸世間若生若滅一切種緣起正觀了知因緣起智入三解脫門知空無相無願依彼故離我我所若有若無想如是第一義善思惟衆生煩惱結縛因緣和合有為性劣離我我所生諸過惡非離煩惱因緣和合我當斷彼煩惱因緣和合自護故不滅一切有為護衆生故如是智悲隨行於此住名向無礙智般若波羅蜜住現在前一切世間所不能染如是住者若利第七地方便行究竟菩薩忍彼隨順忍所攝是向無礙智般若波羅蜜修集具足取菩提因緣不住世俗有為示現寂滅而不住寂滅如是方便智慧隨順入空三昧門向百萬三昧門如空三昧無相無願三昧門亦如是如是向諸三昧已名為不壞心一切種佛法轉增殊勝外道魔怨所不能壞餘如前説譬如真金以琉璃莊嚴勝於餘金如是菩薩善根清淨勝於一切譬如月光除衆生惱四方風輪不能障蔽菩薩智慧光明亦復如是為諸衆生息煩惱火一切魔怨不能斷絶若更受生為善化自在天王常以諸善法滅除衆生一切憍慢神力勝前億千倍是名略説緣起相應增上慧住所謂平等法成就入覺諸緣起生解脫門離諸邪想方便攝受住向無礙智般若波羅蜜得向無量三昧得不壞心佛法殊勝善根清淨受生神力廣説如修多羅十地現前地説無礙智向是故彼地名為現前即此義名為緣起相應增上慧住云何菩薩有行有開發無相住行相是菩薩於緣起相應增上慧住次第十方便慧生一切衆生不共世俗及得一切世間不共道方便升進增上滿足已入第七住彼諸方便慧如修多羅説謂出生世間善法攝受功德故於諸衆生安心樂心福德衆具菩提分法漸次增進故不共聲聞故不共緣覺故知衆生法界故知世界故知如來身口意故如是等方便慧生道次第方便升進義故略説當知如是具足無量無數如來境界各別智彼起無開發無相想無想觀無量佛境界起處不斷無開轉修習一切威儀行住思惟於彼一切處終不離道於念念中具足十波羅蜜及一切菩提分法非如餘住第一歡喜住修習正願第二住離惡戒垢第三住願轉增長得法光明第四住入道第五住入世間所作第六住入甚深法門此第七住起一切佛法滿足菩提分菩薩方便行滿足攝受於此住智慧神通行清淨入第八住住第八住者一向清淨此第七住雜清淨住前行故得不染污名不染污行此第七住一切貪等煩惱斷故不名有煩惱不名離煩惱不行亦樂佛法如實心清淨故不名離煩惱此第七住成就無量清淨身口意業如佛所歎業如前説五住所得世間工業智自然滿足為三千大千世界大師唯除上地菩薩及如來餘無及者一切禪定菩提分法皆現前修而不受報菩薩於此住思惟方便入善擇三昧門生百萬三昧超過一切聲聞緣覺三昧境界遠離煩惱諸妄想行隨順甚深身口意業不捨方便勝進之道顧念衆生滿足菩提離一切相無量身口意業生淨修無生法忍於此住超過自覺境界餘六住佛法攀緣第六住菩薩能入寂滅今住此地念念寂滅得未曾有身口意業不思議雖行實際而不證實際如是方便智生為增上已行共一切衆生行照明世間餘如修多羅説取要言之為功德事親屬想攝受方便勝進住三解脫求下乘者方便調伏受五欲者令求勝欲轉諸邪見隨順他心於諸大會皆悉隨順餘如前説譬如成鍊真金以摩尼珠寶莊嚴勝閻浮檀金菩薩善根清淨勝於一切聲聞緣覺及餘離垢菩薩譬如日光照閻浮提一切泥水皆悉乾消勝於餘光是菩薩智慧光明能令衆生煩惱乾消勝於一切聲聞緣覺及餘菩薩智慧光明若更受生作他化自在天王以智慧饒益聲聞緣覺一切神力勝前億百千倍是名略説有行有開發無相住所謂方便慧生道方便勝進入知如來境界所起處無間方便於念念中集菩提分染污不染污處方便行滿足攝受淨心業生故一切世間工巧業滿足得無量三昧不共一切聲聞緣覺念念寂滅行於一切共世間行善根清淨受生神力廣説如修多羅十地遠行地説方便行滿足是故彼地名為遠行即此義名為有行有開發無相住云何菩薩無行無開發無相住行相是菩薩於初無相住次第得十種入一切法第一義智如修多羅説謂三世如所應本來不起不生無相故無餘因性故第一義離言説自性事言説行顯示自性相因性無有彼如是不生故於彼無知邪計著因於彼無所有事離言説初中後一切時煩惱等入正離妄想平等斷彼煩惱故十種智增上滿足滿足已入第八清淨住於彼不起法得快淨第一無生法忍彼云何謂四種求求一切法四種如實知知一切法以求知故離一切妄想計著一切法現法中一切煩惱無生隨順觀來世一切無餘無生觀如等前妄想計著因起法四種求四種如實知如前真實品説從解行住起乃至有行有開發無相住未得快淨於此住乃得快淨是故名第一無生法忍得無生法忍已得甚深法離初無相住四種過患一者有行有開發二者上地勤求三者一切種利益衆生堪能勤求四者微細想行是故此住名為快淨於甚深法門法流水中如來勸發出生無量門智慧神通諸業饒益以勸發故出生無量尊身變化智慧得十自在如修多羅説得自在故欲久近住隨意即能諸禪解脫隨意所欲資生衆具世工巧業悉得隨意一切住處一切受生隨意往生一切神力一切誓願隨意能得變一切物成於金寶隨意能成欲知法界名身句身味身於一切法建立巧便即能知之如是自在力果報福利如修多羅説於念念中常等見佛善根清淨受生神力金光明喻如修多羅説是名略説無行無開發無相住所謂入第一義智成就入得不起法忍過患悉離得快淨住甚深法門諸佛勸發出生無量智慧神通諸業饒益無量尊身出生智慧出生得大勢力得大自在力福利果報善根清淨受生神力廣説如修多羅十地不動地説離有行有開發乘不動勝進道是故彼地名為不動即此地名為無行無開發無相住云何菩薩無礙住行相是菩薩於此甚深住不以為足勤修隨順上地勝進知法之行一切種為人廣説隨所應説悉如實知所可説法煩惱清淨誰惱誰淨悉如實知如是善説法名大法師得無量陀羅尼善諸音聲辨才無盡法陀羅尼如所持法攝受成就以菩薩無礙智出生言説坐於法座如應説法隨其法示喜成如修多羅説善根清淨受生神力勝進如修多羅説是名略説菩薩無礙住所謂樂深解脫説法行智不思議大法師善根清淨受生神力廣説如修多羅十地善慧地説安樂一切衆生淨修菩薩無礙廣説大法是故彼地名為善慧即此義名為無礙住云何最上菩薩住行相是菩薩於無礙住淨修一切種淨法王所應灌頂正受得離垢等無量三昧作所應作已一切智殊勝灌頂最後三昧現前得一切佛同坐身蓮華眷屬光明所照得一切種一切智灌頂已受調伏解脫方便知一切佛事得無量解脫總持神通彼增上故大念智慧生辨才建立大神通出生善根清淨受正神力勝進是名略説最上菩薩住廣説如修多羅十地法雲地説法雲地菩薩滿足菩薩道滿足菩提衆具得菩薩勝慧興大法雲以正覺自覺而諸衆生煩惱垢穢悉令休息種種善根增長成熟是故彼地名為法雲即此義名為最上菩薩住如上説展轉上功德前地所無以軟根者不在數諸中上者上地所得具足建立彼一一住經億百千大劫或復無量然後具足彼一切住經三阿僧祇大劫然後得初阿僧祇大劫解行住過得歡喜住五行勝進第二阿僧祇大劫從歡喜住乃至有開發無相住過得無開發無相住彼即此決定謂淨心菩薩決定勝進第三阿僧祇大劫無開發無相住及無礙智住過得最上菩薩住有二阿僧祇劫若大劫晝夜月分數成時無量故名阿僧祇若彼諸大劫數成一劫數過數名阿僧祇前阿僧祇劫菩提非少劫阿僧祇得後三阿僧祇大劫不增若彼上上精進方便能成超衆多中劫或復超大劫無超阿僧祇者如是十二住菩薩三阿僧祇煩惱障分染污及智障分染污斷彼三住煩惱障分染污斷歡喜住惡趣煩惱分增上中煩惱分一切不行無開發無相住無生法忍清淨相續煩惱分一切染污斷不行一切煩惱最上菩薩住一切煩惱習使障斷入如來住智障分染污有三種一者皮二者膚三者骨歡喜住皮障斷無開發無相住膚障斷如來住骨障斷一切障清淨於此三住智障斷餘住隨其次第真實衆具如是十三住有十一種淨第一種性淨第二解行淨第三淨心淨第四戒淨第五意淨第六第七第八正智方便淨第九方便行滿足淨第十真實智神通出生淨第十一説正義無礙淨第十二隨順入一切種一切所知智淨第十三如來住習氣一切煩惱智障淨如前菩薩功德品説八法攝一切摩訶衍菩薩藏所説此十三住攝初第一住信心生解於菩薩藏得聞慧思慧第三住淨心及初修慧行第四住乃至第九有行有開發無相住修慧廣第十第十一第十二住淨修慧行所攝修慧果成如來住畢竟出離聲聞住所有法此等十二菩薩住次第當知一者如聲聞自種性住此亦當知如超升離生方便住第二住亦如是如超升離生信第三住亦如是如得不壞淨聖愛增上戒住上漏盡第四住亦如是如依增上戒增上意學出生住第五住亦如是如得真諦智增上慧學住第六第七第八住亦如是如善觀察住無相三昧方便第九住亦如是如究竟無相住第十住亦如是如禪定起解脫覺住第十一住亦如是如一切種阿羅漢住第十二住亦如是起解脫入住者起謂從定覺也五解脫入如雜心説
